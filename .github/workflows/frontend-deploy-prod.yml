# Prod deploy is manual-only (workflow_dispatch). OpenNext → S3 assets + Lambda + CloudFront invalidation.
name: Frontend Deploy (prod)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: frontend-prod
  cancel-in-progress: true

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      NEXT_PUBLIC_BACKEND_URL: /api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required env vars
        run: |
          missing=""
          [ -z "${{ vars.FRONTEND_DEPLOY_ROLE_ARN }}" ] && missing="$missing FRONTEND_DEPLOY_ROLE_ARN"
          [ -z "${{ vars.S3_BUCKET }}" ] && missing="$missing S3_BUCKET"
          [ -z "${{ vars.CF_DIST_ID }}" ] && missing="$missing CF_DIST_ID"
          [ -z "${{ vars.FRONTEND_SERVER_LAMBDA_NAME }}" ] && missing="$missing FRONTEND_SERVER_LAMBDA_NAME"
          [ -z "${{ vars.FRONTEND_IMAGE_LAMBDA_NAME }}" ] && missing="$missing FRONTEND_IMAGE_LAMBDA_NAME"
          [ -z "${{ vars.AWS_REGION }}" ] && missing="$missing AWS_REGION"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty GitHub env vars:$missing"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.FRONTEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build and package OpenNext
        working-directory: frontend
        env:
          BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL }}
        run: |
          npm ci
          npm run build:opennext
          npm run package:opennext

      - name: Sync static assets to S3
        run: |
          aws s3 sync frontend/.open-next/assets "s3://${{ vars.S3_BUCKET }}/_assets" --delete

      - name: Update server Lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.FRONTEND_SERVER_LAMBDA_NAME }}" \
            --zip-file fileb://frontend/opennext-server.zip
          aws lambda wait function-updated-v2 \
            --function-name "${{ vars.FRONTEND_SERVER_LAMBDA_NAME }}"

      - name: Update image optimizer Lambda
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.FRONTEND_IMAGE_LAMBDA_NAME }}" \
            --zip-file fileb://frontend/opennext-image.zip
          aws lambda wait function-updated-v2 \
            --function-name "${{ vars.FRONTEND_IMAGE_LAMBDA_NAME }}"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CF_DIST_ID }}" \
            --paths "/*"
          echo "CloudFront invalidation started."
