# Backend deploy to DEV: build image, push to ECR (immutable :shortsha + moving :dev-latest), update ECS.
# Uses OIDC (backend_deploy_role_arn). Requires GitHub env "dev" vars:
#   BACKEND_DEPLOY_ROLE_ARN, AWS_REGION, BACKEND_ECR_REPO_URL,
#   BACKEND_ECS_CLUSTER, BACKEND_ECS_SERVICE, BACKEND_API_BASE_URL

name: Backend Deploy (dev)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'infra/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required env vars
        run: |
          missing=""
          [ -z "${{ vars.BACKEND_DEPLOY_ROLE_ARN }}" ] && missing="$missing BACKEND_DEPLOY_ROLE_ARN"
          [ -z "${{ vars.BACKEND_ECR_REPO_URL }}" ] && missing="$missing BACKEND_ECR_REPO_URL"
          [ -z "${{ vars.BACKEND_ECS_CLUSTER }}" ] && missing="$missing BACKEND_ECS_CLUSTER"
          [ -z "${{ vars.BACKEND_ECS_SERVICE }}" ] && missing="$missing BACKEND_ECS_SERVICE"
          [ -z "${{ vars.AWS_REGION }}" ] && missing="$missing AWS_REGION"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty GitHub env vars:$missing"
            exit 1
          fi

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.BACKEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set image tag
        id: image
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "tag=$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "Image tag: $SHA_SHORT"

      - name: Login to ECR
        run: |
          ECR_REPO_URL="${{ vars.BACKEND_ECR_REPO_URL }}"
          ECR_HOST="${ECR_REPO_URL%%/*}"
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} | \
            docker login --username AWS --password-stdin "$ECR_HOST"

      - name: Build and push Docker image
        run: |
          REPO_URL="${{ vars.BACKEND_ECR_REPO_URL }}"
          TAG="${{ steps.image.outputs.tag }}"
          docker build -t "${REPO_URL}:${TAG}" -t "${REPO_URL}:dev-latest" -f backend/Dockerfile backend/
          # Push immutable tag first, then moving tag (ECS task def uses dev-latest)
          docker push "${REPO_URL}:${TAG}"
          docker push "${REPO_URL}:dev-latest"

      - name: Update ECS service (task def uses dev-latest; force new deployment)
        run: |
          CLUSTER="${{ vars.BACKEND_ECS_CLUSTER }}"
          SERVICE="${{ vars.BACKEND_ECS_SERVICE }}"
          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --force-new-deployment \
            --query 'service.deployments' --output table

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.BACKEND_ECS_CLUSTER }}" \
            --services "${{ vars.BACKEND_ECS_SERVICE }}"
          echo "Service is stable."

      - name: Deployment summary
        run: |
          echo "## Backend deploy (dev) complete" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`dev-latest\` (SHA \`${{ steps.image.outputs.tag }}\`) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend API base URL** | ${{ vars.BACKEND_API_BASE_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "API: ${{ vars.BACKEND_API_BASE_URL }}/api" >> $GITHUB_STEP_SUMMARY
          echo "Image: ${{ vars.BACKEND_ECR_REPO_URL }}:dev-latest"
