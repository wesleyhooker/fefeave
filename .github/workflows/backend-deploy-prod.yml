# Prod deploy is manual-only (workflow_dispatch). Backend → Lambda (no ECS/ECR).
# Uses OIDC. Requires GitHub env "prod" vars: BACKEND_DEPLOY_ROLE_ARN, AWS_REGION,
# BACKEND_LAMBDA_FUNCTION_NAME. Optional: BACKEND_API_GATEWAY_URL (post-deploy health check).
# Optional secret: DATABASE_URL — enables pre-deploy migration verification.

name: Backend Deploy (prod)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: backend-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required env vars
        run: |
          missing=""
          [ -z "${{ vars.BACKEND_DEPLOY_ROLE_ARN }}" ] && missing="$missing BACKEND_DEPLOY_ROLE_ARN"
          [ -z "${{ vars.BACKEND_LAMBDA_FUNCTION_NAME }}" ] && missing="$missing BACKEND_LAMBDA_FUNCTION_NAME"
          [ -z "${{ vars.AWS_REGION }}" ] && missing="$missing AWS_REGION"
          if [ -n "$missing" ]; then
            echo "::error::Missing or empty GitHub env vars:$missing"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Verify migrations (optional)
        if: ${{ secrets.DATABASE_URL != '' }}
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npm run verify:migrations
          echo "Migration verification passed."

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.BACKEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Build and package Lambda
        working-directory: backend
        run: |
          npm run build:lambda
          npm run package:lambda
          ls -lh lambda.zip

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name "${{ vars.BACKEND_LAMBDA_FUNCTION_NAME }}" \
            --zip-file fileb://backend/lambda.zip
          aws lambda wait function-updated-v2 \
            --function-name "${{ vars.BACKEND_LAMBDA_FUNCTION_NAME }}"
          echo "Lambda updated: ${{ vars.BACKEND_LAMBDA_FUNCTION_NAME }}"

      - name: Post-deploy readiness check
        run: |
          set -euo pipefail
          if [ -z "${{ vars.BACKEND_API_GATEWAY_URL }}" ]; then
            echo "Skipping readiness check (BACKEND_API_GATEWAY_URL not set)."
            exit 0
          fi
          BASE="${{ vars.BACKEND_API_GATEWAY_URL }}"
          BASE="${BASE%/}"
          BODY="$(curl -sfS "${BASE}/api/health")"
          printf '%s\n' "$BODY" | head -c 800
          echo ""
          STATUS="$(printf '%s' "$BODY" | node -e "const j=JSON.parse(require('fs').readFileSync(0,'utf8')); process.stdout.write(j.status||'');")"
          DB="$(printf '%s' "$BODY" | node -e "const j=JSON.parse(require('fs').readFileSync(0,'utf8')); process.stdout.write(j.checks?.database?.status||'');")"
          MIG="$(printf '%s' "$BODY" | node -e "const j=JSON.parse(require('fs').readFileSync(0,'utf8')); process.stdout.write(j.checks?.migrations?.status||'');")"
          if [ "$STATUS" != "ok" ] || [ "$DB" != "ok" ] || [ "$MIG" != "ok" ]; then
            echo "::error::Readiness check failed (status=$STATUS database=$DB migrations=$MIG)"
            exit 1
          fi
          echo "Readiness check OK: ${BASE}/api/health"

      - name: Deployment summary
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "## Backend deploy (prod) complete" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${SHA_SHORT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Lambda** | \`${{ vars.BACKEND_LAMBDA_FUNCTION_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ vars.BACKEND_API_GATEWAY_URL }}" ]; then
            echo "| **API readiness** | ${{ vars.BACKEND_API_GATEWAY_URL }}/api/health |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [deploy-checklist.md](../../docs/deployment/deploy-checklist.md) for operator steps." >> $GITHUB_STEP_SUMMARY
