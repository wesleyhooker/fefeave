# Backend deploy to PROD: manual only. Build image, push immutable :<shortsha>, register new task def, update ECS.
# Uses OIDC. Requires GitHub env "prod" vars: BACKEND_DEPLOY_ROLE_ARN, AWS_REGION, BACKEND_ECR_REPO_URL,
# BACKEND_ECS_CLUSTER, BACKEND_ECS_SERVICE, BACKEND_API_BASE_URL.
# PROD deploy is manual only — no push triggers.

name: Backend Deploy (prod)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.BACKEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Set image tag
        id: image
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "tag=$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "Image tag: $SHA_SHORT (immutable)"

      - name: Login to ECR
        run: |
          ECR_REPO_URL="${{ vars.BACKEND_ECR_REPO_URL }}"
          ECR_HOST="${ECR_REPO_URL%%/*}"
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} | \
            docker login --username AWS --password-stdin "$ECR_HOST"

      - name: Build and push Docker image (immutable tag only)
        run: |
          REPO_URL="${{ vars.BACKEND_ECR_REPO_URL }}"
          TAG="${{ steps.image.outputs.tag }}"
          docker build -t "${REPO_URL}:${TAG}" -f backend/Dockerfile backend/
          docker push "${REPO_URL}:${TAG}"

      - name: Register new task definition and update ECS service
        run: |
          CLUSTER="${{ vars.BACKEND_ECS_CLUSTER }}"
          SERVICE="${{ vars.BACKEND_ECS_SERVICE }}"
          REPO_URL="${{ vars.BACKEND_ECR_REPO_URL }}"
          TAG="${{ steps.image.outputs.tag }}"
          IMAGE="${REPO_URL}:${TAG}"

          TASK_ARN=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SERVICE" \
            --query 'services[0].taskDefinition' --output text)
          TASK_DEF=$(aws ecs describe-task-definition --task-definition "$TASK_ARN" \
            --query 'taskDefinition')
          NEW_DEF=$(echo "$TASK_DEF" | jq --arg img "$IMAGE" \
            'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) |
            .containerDefinitions[0].image = $img')
          NEW_TASK=$(aws ecs register-task-definition --cli-input-json "$NEW_DEF")
          FAMILY=$(echo "$NEW_TASK" | jq -r '.taskDefinition.family')
          REV=$(echo "$NEW_TASK" | jq -r '.taskDefinition.revision')

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "$SERVICE" \
            --task-definition "${FAMILY}:${REV}" \
            --query 'service.deployments' --output table

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "${{ vars.BACKEND_ECS_CLUSTER }}" \
            --services "${{ vars.BACKEND_ECS_SERVICE }}"
          echo "Service is stable."

      - name: Deployment summary
        run: |
          echo "## Backend deploy (prod) complete" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ steps.image.outputs.tag }}\` (immutable) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Backend API base URL** | ${{ vars.BACKEND_API_BASE_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "API: ${{ vars.BACKEND_API_BASE_URL }}/api"
          echo "Image: ${{ vars.BACKEND_ECR_REPO_URL }}:${{ steps.image.outputs.tag }}"
