# .github/workflows/frontend-ci.yml
name: Frontend CI
on:
  push:
    branches: [main]
    paths:
      [
        "frontend/**",
        "package.json",
        "package-lock.json",
        "frontend/next.config.ts",
      ]
  pull_request:
    paths:
      [
        "frontend/**",
        "package.json",
        "package-lock.json",
        "frontend/next.config.ts",
      ]
  workflow_dispatch:
permissions: { contents: read }

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Security audit
        run: npm audit --audit-level=moderate
        working-directory: frontend

      - name: Build application
        run: npm run build
        working-directory: frontend
      - name: CI failure hint
        if: failure()
        run: |
          echo "Frontend check failed. Run: make check to reproduce locally."
