services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: fefeave
      POSTGRES_USER: fefeave
      POSTGRES_PASSWORD: fefeave
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fefeave -d fefeave"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
